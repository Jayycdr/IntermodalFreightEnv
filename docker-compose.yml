version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intermodal-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    networks:
      - intermodal-network

  frontend:
    image: python:3.11-slim
    container_name: intermodal-frontend
    working_dir: /app
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "pip install streamlit plotly --quiet &&
               streamlit run frontend/dashboard.py --server.port=8501 --server.address=0.0.0.0"
    volumes:
      - .:/app
    depends_on:
      - backend
    networks:
      - intermodal-network

networks:
  intermodal-network:
    driver: bridge
